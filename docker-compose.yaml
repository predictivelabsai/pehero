services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5057:5057"
    environment:
      - DB_URL=${DB_URL}
      - XAI_API_KEY=${XAI_API_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5057/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
